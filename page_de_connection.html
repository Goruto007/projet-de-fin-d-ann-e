<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Page de connexion et inscription de Chris & Compagnie">
        <meta name="author" content="chris-yohan">
        <title>Connexion - Chris & Compagnie</title>
        <link rel="stylesheet" href="dossier css/connection.css">
    </head>
    <body>
        <header class="auth-header">
            <nav class="auth-nav" aria-label="Navigation principale">
              <h1 class="brand">Chris & Compagnies</h1>
            </nav>
        </header>
    
            </section>

            <div class="connection">
            <section class="auth-panel" aria-label="Formulaires de connexion et inscription">
                <input type="radio" name="auth-tab" id="tab-login" checked>
                <input type="radio" name="auth-tab" id="tab-register">

                <div class="tab-switch">
                    <label for="tab-login">Connexion</label>
                    <label for="tab-register">Inscription</label>
                </div>

                <div class="forms-wrapper">
                    <form class="auth-form login-form" action="#" method="post">
                        <h2>Bon retour</h2>
                        <p>Entrez vos informations pour acceder a votre espace.</p>

                        <div class="field-group">
                            <label for="login-email">Adresse email</label>
                            <input type="email" id="login-email" name="email" placeholder="exemple@email.com" required>
                        </div>

                        <div class="field-group">
                            <label for="login-password">Mot de passe</label>
                            <input type="password" id="login-password" name="password" placeholder="Votre mot de passe" required>
                            <button type="button" class="btn-motdepasse" onclick="afficherMotdePasse()">🔒</button>
                        </div>

                        <div class="form-options">
                            <label class="check-line">
                                <input type="checkbox" name="remember">
                                <span>Se souvenir de moi</span>
                            </label>
                            <a href="#">Mot de passe oublie ?</a>
                        </div>

                        <button type="submit" class="primary-btn">Se connecter</button>
                    </form>

                    <form class="auth-form register-form" action="#" method="post">
                        <h2>Creer un compte</h2>
                        <p>Inscrivez-vous pour gerer vos achats et vos locations.</p>

                        <div class="field-group">
                            <label for="username">Nom d'utilisateur</label>
                            <input type="text" id="username" name="username" placeholder="Chris_Yohan"  title="Le nom d'utilisateur doit contenir au moins une lettre et un caractère spécial" required>
                        </div>
                        <div class="field-grid">
                            <div class="field-group">
                                <label for="first-name">Prenom</label>
                                <input type="text" id="first-name" name="first-name" placeholder="Chris" required>
                            </div>

                            <div class="field-group">
                                <label for="last-name">Nom</label>
                                <input type="text" id="last-name" name="last-name" placeholder="Yohan" required>
                            </div>
                        </div>
                        
                        <div class="field-group">
                            <label for="adress">votre adresse</label>
                            <input type="text" id="adress" name="adress" placeholder="N°/Av/Q/C" required >
                        </div>

                        <div class="field-group">
                            <label for="register-email">Adresse email</label>
                            <input type="email" id="register-email" name="email" placeholder="exemple@email.com" required>
                        </div>

                        <div class="field-group">
                            <label for="register-password">Mot de passe</label>
                            <input type="password" id="register-password" name="password" placeholder="Minimum 8 caracteres" minlength="8" required>
                            <button type="button" class="btn-motdepasse" onclick="afficherMotdePasse2()">🔒</button>
                        </div>

                        <label class="check-line terms">
                            <input type="checkbox" name="terms" required>
                            <span>J'accepte les conditions d'utilisation.</span>
                        </label>

                        <button type="submit" class="primary-btn">Creer mon compte</button>
                    </form>
                </div>
            </section>
            </div>
        </main>
        <script src="dossier javascript/connection.js"></script>
    </body>
</html>
